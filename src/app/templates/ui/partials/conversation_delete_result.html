<div class="delete-result">
  {% if delete_message %}
    <div class="alert alert-success" role="status">{{ delete_message }}</div>
  {% else %}
    <div class="alert alert-error" role="alert">
      {{ delete_error or "The delete request could not be completed." }}
    </div>
  {% endif %}

  {% if delete_error_status %}
    <p class="note">Status {{ delete_error_status }}</p>
  {% endif %}
</div>
